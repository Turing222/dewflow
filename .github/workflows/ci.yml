name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: QA
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_ENV: test
      SECRET_KEY: local-dev-secret
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/mentor_ai_test
      REDIS_URL: redis://localhost:6379/0
      TASKIQ_REDIS_URL: redis://localhost:6379/1
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mentor_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mentor_ai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache Python virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: uv-${{ runner.os }}-py312-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-py312-

      - name: Sync Python dependencies
        run: uv sync --frozen --dev --all-extras

      - name: Run unit tests
        run: make qa-test-unit

      - name: Run integration tests
        run: make qa-test-integration

      - name: Run lint
        run: make qa-lint

      - name: Run format check
        run: make qa-format-check

      - name: Run typecheck
        run: make qa-typecheck

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    needs: qa
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache Python virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: uv-${{ runner.os }}-py312-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-py312-

      - name: Sync Python dependencies
        run: uv sync --frozen --dev --all-extras

      - name: Prepare smoke environment file
        run: make env-smoke-prepare

      - name: Build Docker image
        run: make image-build

      - name: Start smoke environment
        run: make env-smoke-up

      - name: Wait for smoke environment
        run: make env-smoke-wait

      - name: Verify smoke checks
        run: make verify-smoke

      - name: Dump smoke logs on failure
        if: failure()
        run: make env-smoke-logs

      - name: Tear down smoke environment
        if: always()
        run: make env-smoke-down
