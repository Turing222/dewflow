name: Smoke CI

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - "Dockerfile"
      - "docker-compose*.yml"
      - "Makefile"
      - ".env.features.template"
      - ".env.smoke.template"
      - "scripts/smoke/**"
      - "scripts/image/**"
      - ".github/workflows/smoke-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache Python virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: uv-${{ runner.os }}-py312-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-py312-

      - name: Sync Python dependencies
        run: uv sync --frozen --dev --all-extras

      - name: Prepare smoke environment file
        run: make env-smoke-prepare

      - name: Build Docker image
        run: make image-build

      - name: Start smoke environment
        run: make env-smoke-up

      - name: Wait for smoke environment
        run: make env-smoke-wait

      - name: Verify smoke checks
        env:
          SMOKE_STRICT: "true"
        run: make verify-smoke

      - name: Dump smoke logs on failure
        if: failure()
        run: make env-smoke-logs

      - name: Tear down smoke environment
        if: always()
        run: make env-smoke-down
