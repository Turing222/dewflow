apiVersion: apps/v1
kind: Deployment
metadata:
  name: dewflow-api
  namespace: dewflow
  labels:
    app.kubernetes.io/name: dewflow-api
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dewflow-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dewflow-api
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      terminationGracePeriodSeconds: 45
      containers:
        - name: api
          image: dewflow-backend:2.0.0-web
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: dewflow-config
            - secretRef:
                name: dewflow-secret
          env:
            - name: PYTHONMALLOC
              value: "default"
            - name: WEB_CONCURRENCY
              value: "1"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 800Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health_check/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health_check/db_ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: knowledge-files
              mountPath: /data/knowledge_files
      volumes:
        - name: knowledge-files
          persistentVolumeClaim:
            claimName: dewflow-knowledge-files
