apiVersion: v1
kind: Service
metadata:
  name: dewflow-frontend
  namespace: dewflow
  labels:
    app.kubernetes.io/name: dewflow-frontend
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dewflow-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
