apiVersion: apps/v1
kind: Deployment
metadata:
  name: dewflow-frontend
  namespace: dewflow
  labels:
    app.kubernetes.io/name: dewflow-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dewflow-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dewflow-frontend
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
      containers:
        - name: frontend
          image: dewflow-frontend:2.0.0
          # NOTE: imagePullPolicy can be changed to Always in CI/CD pipeline if tag recycling is used
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
