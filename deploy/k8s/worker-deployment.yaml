apiVersion: apps/v1
kind: Deployment
metadata:
  name: dewflow-worker
  namespace: dewflow
  labels:
    app.kubernetes.io/name: dewflow-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dewflow-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dewflow-worker
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      terminationGracePeriodSeconds: 130
      containers:
        - name: worker
          image: ai-tutor-backend:ai-v1
          imagePullPolicy: IfNotPresent
          command:
            - taskiq
            - worker
            - backend.infra.task_broker:broker
            - backend.worker.tasks.llm_tasks
            - backend.worker.tasks.knowledge_tasks
            - --workers
            - "2"
            - --wait-tasks-timeout
            - "105"
            - --shutdown-timeout
            - "10"
          envFrom:
            - configMapRef:
                name: dewflow-config
            - secretRef:
                name: dewflow-secret
          env:
            - name: TASKIQ_HEALTH_MIN_PROCESSES
              value: "2"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1536Mi
          livenessProbe:
            exec:
              command:
                - python
                - -m
                - backend.worker.tasks.healthcheck
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 2
          readinessProbe:
            exec:
              command:
                - python
                - -m
                - backend.worker.tasks.healthcheck
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 2
          volumeMounts:
            - name: knowledge-files
              mountPath: /data/knowledge_files
      volumes:
        - name: knowledge-files
          persistentVolumeClaim:
            claimName: dewflow-knowledge-files
