apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dewflow-api
  namespace: dewflow
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: api.dewflow.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: dewflow-api
                port:
                  name: http
