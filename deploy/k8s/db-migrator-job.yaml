apiVersion: batch/v1
kind: Job
metadata:
  name: dewflow-db-migrator
  namespace: dewflow
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-migrator
          image: ai-tutor-backend:web-v1
          imagePullPolicy: IfNotPresent
          command:
            - alembic
            - upgrade
            - head
          envFrom:
            - configMapRef:
                name: dewflow-config
            - secretRef:
                name: dewflow-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
