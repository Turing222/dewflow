apiVersion: v1
kind: ConfigMap
metadata:
  name: dewflow-config
  namespace: dewflow
data:
  APP_ENV: "prod"
  PROJECT_NAME: "Dewflow AI"
  VERSION: "0.1.0"
  API_ROOT_PATH: "/api"
  API_V1_STR: "/v1"
  POSTGRES_DB: "postgres"
  POSTGRES_SERVER: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_POOL_SIZE: "10"
  POSTGRES_MAX_OVERFLOW: "20"
  POSTGRES_CONNECT_TIMEOUT_SECONDS: "10"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  LLM_PROVIDER: "gemini"
  RAG_EMBED_PROVIDER: "google"
  RAG_REFUSAL_ENABLED: "true"
  RAG_MIN_HIT_COUNT: "1"
  RAG_MIN_RELEVANCE_SCORE: "0.2"
  RAG_MIN_RERANK_SCORE: "4.0"
  RAG_REFUSAL_MESSAGE: "知识库中没有找到足够相关的信息，暂时无法基于资料回答。"
  STORAGE_BACKEND: "local"
  LOCAL_STORAGE_ROOT: "/data/knowledge_files"
  S3_BUCKET: "knowledge-files"
  S3_PREFIX: "knowledge_files"
  S3_REGION: "us-east-1"
  S3_ENDPOINT_URL: "http://minio:9000"
  ENABLE_OTEL_METRICS: "false"
  ENABLE_OTEL_TRACES: "false"
  OTEL_TRACES_ENDPOINT: "http://otel-collector:4318/v1/traces"
  PROMETHEUS_OTLP_ENDPOINT: "http://otel-collector:4318/v1/metrics"
  LANGFUSE_BASE_URL: "https://cloud.langfuse.com"
