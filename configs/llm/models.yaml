version: 1
default_profile: mock

profiles:
  mock:
    provider: mock
    model: mock
    aliases:
      - mock
      - mock-llm
      - fake

  openai_compatible:
    provider: openai-compatible
    model: gpt-4o-mini
    base_url: https://api.openai.com/v1
    api_key_envs:
      - LLM_API_KEY
      - OPENAI_API_KEY
    aliases:
      - openai
      - openai-compatible
      - external-api

  bifrost:
    provider: openai-compatible
    model: deepseek/deepseek-chat
    base_url: http://bifrost:8080/v1  # Docker network only
    api_key_envs:
      - BIFROST_API_KEY
    aliases:
      - bifrost
      - llm-gateway
      - ai-gateway

  bifrost_reasoner:
    provider: openai-compatible
    model: deepseek/deepseek-reasoner
    base_url: http://bifrost:8080/v1  # Docker network only
    api_key_envs:
      - BIFROST_API_KEY
    aliases:
      - bifrost-reasoner
      - gateway-reasoner

  bifrost_v4_flash:
    provider: openai-compatible
    model: deepseek/deepseek-v4-flash
    base_url: http://bifrost:8080/v1  # Docker network only
    api_key_envs:
      - BIFROST_API_KEY
    aliases:
      - bifrost-flash
      - bifrost_flash
      - gateway-flash

  bifrost_v4_flash_thinking:
    provider: openai-compatible
    model: deepseek/deepseek-v4-flash
    base_url: http://bifrost:8080/v1  # Docker network only
    api_key_envs:
      - BIFROST_API_KEY
    aliases:
      - bifrost-flash-thinking
      - bifrost_flash_thinking
      - gateway-flash-thinking
    extra_body:
      thinking:
        type: enabled

  bifrost_v4_pro:
    provider: openai-compatible
    model: deepseek/deepseek-v4-pro
    base_url: http://bifrost:8080/v1  # Docker network only
    api_key_envs:
      - BIFROST_API_KEY
    aliases:
      - bifrost-pro
      - bifrost_pro
      - gateway-pro
    extra_body:
      thinking:
        type: enabled

  deepseek_v4_flash:
    provider: deepseek
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com
    api_key_envs:
      - DEEPSEEK_API_KEY
      - LLM_API_KEY
    aliases:
      - deepseek
      - deepseek-v4-flash

  deepseek_v4_flash_thinking:
    provider: deepseek
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com
    api_key_envs:
      - DEEPSEEK_API_KEY
      - LLM_API_KEY
    aliases:
      - deepseek-v4-flash-thinking
      - deepseek_flash_thinking
    extra_body:
      thinking:
        type: enabled

  deepseek_v4_pro:
    provider: deepseek
    model: deepseek-v4-pro
    base_url: https://api.deepseek.com
    api_key_envs:
      - DEEPSEEK_API_KEY
      - LLM_API_KEY
    aliases:
      - deepseek-v4-pro
      - deepseek_pro
    extra_body:
      thinking:
        type: enabled

  gemini:
    provider: gemini
    model: gemini-2.5-flash
    api_key_envs:
      - GEMINI_API_KEY
      - GOOGLE_API_KEY
    aliases:
      - gemini
      - google
      - google-gla
      - pydantic-ai
      - pydantic_ai

routes:
  resilient:
    profiles:
      - deepseek_v4_flash
      - gemini
    aliases:
      - auto
      - failover
      - resilient

embeddings:
  default_profile: google

  profiles:
    mock:
      provider: mock
      model: mock
      dimensions: 768
      aliases:
        - mock
        - fake
        - deterministic

    google:
      provider: google
      model: gemini-embedding-2
      # Keep 768 for the existing pgvector column; Gemini truncates via output_dimensionality.
      dimensions: 768
      api_key_envs:
        - RAG_EMBED_API_KEY
        - DASHSCOPE_API_KEY
        - GEMINI_API_KEY
        - GOOGLE_API_KEY
      aliases:
        - google
        - gemini
        - google-genai

    qwen3_text_embedding_v4:
      provider: openai-compatible
      model: text-embedding-v4
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      dimensions: 768
      api_key_envs:
        - DASHSCOPE_API_KEY
        - RAG_EMBED_API_KEY
      aliases:
        - qwen3
        - qwen3-embedding
        - text-embedding-v4
        - dashscope
        - aliyun

    bifrost_embedding:
      provider: openai-compatible
      model: text-embedding-v4
      base_url: http://bifrost:8080/v1  # Docker network only
      dimensions: 768
      api_key_envs:
        - BIFROST_API_KEY
      aliases:
        - bifrost-embedding
        - gateway-embedding

    openai_compatible:
      provider: openai-compatible
      model: text-embedding-3-small
      dimensions: 1536
      api_key_envs:
        - RAG_EMBED_API_KEY
        - LLM_API_KEY
        - OPENAI_API_KEY
      aliases:
        - openai
        - openai-compatible
        - external-api

reranks:
  default_profile: dashscope_rerank

  profiles:
    dashscope_rerank:
      provider: dashscope
      model: qwen3-rerank
      base_url: https://dashscope.aliyuncs.com/compatible-api/v1
      api_key_envs:
        - DASHSCOPE_API_KEY
      aliases:
        - dashscope
        - qwen3-rerank
      score_kind: dashscope_rerank

    bifrost_rerank:
      provider: bifrost
      model: qwen3-rerank
      base_url: http://bifrost:8080/v1
      api_key_envs:
        - BIFROST_API_KEY
      aliases:
        - bifrost
        - bifrost-rerank
        - gateway-rerank
      score_kind: bifrost_rerank
