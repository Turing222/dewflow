# Per-environment flag overrides.
# Keys must match GrowthBook environment IDs (see Settings → Environments).
# Values here override code defaults only for the listed environment.
# Flags not listed use the code default (see _AI_SYSTEM_FLAG_DEFAULTS and ALL_FLAGS).
#
# Usage: python scripts/seed/seed_growthbook.py --env-overrides configs/growthbook/flags.yaml

environments:
  local:
    # Local dev — enable AI features for testing.
    enable-closed-beta-login: true
    enable-external-context: true
    enable-rag-rerank: true
    enable-rag-planner: true
    enable-rag-planner-routing: true
    enable-llm-model-routing: true

  prod:
    # Production — start conservative, enable via GrowthBook panel as needed.
    enable-closed-beta-login: true
    enable-external-context: true
    enable-rag-rerank: true
    enable-rag-planner: true
    enable-rag-planner-routing: true
    enable-llm-model-routing: true
