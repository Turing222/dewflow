x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-app-secrets: &app-secrets
  - SECRET_KEY
  - POSTGRES_PASSWORD
  - REDIS_PASSWORD
  - OPENAI_API_KEY
  - DASHSCOPE_API_KEY
  - DASHSCOPE_API_KEY_2
  - GEMINI_API_KEY
  - GOOGLE_API_KEY
  - GITHUB_TOKEN
  - GROWTHBOOK_SDK_KEY
  - DEEPSEEK_API_KEY
  - DEEPSEEK_API_KEY_2
  - COHERE_API_KEY
  - COHERE_API_KEY_2
  - BIFROST_API_KEY
  - BIFROST_ENCRYPTION_KEY
  - LLM_API_KEY
  - RAG_EMBED_API_KEY
  - LANGFUSE_PUBLIC_KEY
  - LANGFUSE_SECRET_KEY
  - S3_ACCESS_KEY_ID
  - S3_SECRET_ACCESS_KEY
  - TAVILY_API_KEY

x-secret-file-env: &secret-file-env
  SECRET_KEY_FILE: /run/secrets/SECRET_KEY
  POSTGRES_PASSWORD_FILE: /run/secrets/POSTGRES_PASSWORD
  REDIS_PASSWORD_FILE: /run/secrets/REDIS_PASSWORD
  OPENAI_API_KEY_FILE: /run/secrets/OPENAI_API_KEY
  DASHSCOPE_API_KEY_FILE: /run/secrets/DASHSCOPE_API_KEY
  DASHSCOPE_API_KEY_2_FILE: /run/secrets/DASHSCOPE_API_KEY_2
  GEMINI_API_KEY_FILE: /run/secrets/GEMINI_API_KEY
  GOOGLE_API_KEY_FILE: /run/secrets/GOOGLE_API_KEY
  GITHUB_TOKEN_FILE: /run/secrets/GITHUB_TOKEN
  GROWTHBOOK_SDK_KEY_FILE: /run/secrets/GROWTHBOOK_SDK_KEY
  DEEPSEEK_API_KEY_FILE: /run/secrets/DEEPSEEK_API_KEY
  DEEPSEEK_API_KEY_2_FILE: /run/secrets/DEEPSEEK_API_KEY_2
  COHERE_API_KEY_FILE: /run/secrets/COHERE_API_KEY
  COHERE_API_KEY_2_FILE: /run/secrets/COHERE_API_KEY_2
  BIFROST_API_KEY_FILE: /run/secrets/BIFROST_API_KEY
  BIFROST_ENCRYPTION_KEY_FILE: /run/secrets/BIFROST_ENCRYPTION_KEY
  LLM_API_KEY_FILE: /run/secrets/LLM_API_KEY
  RAG_EMBED_API_KEY_FILE: /run/secrets/RAG_EMBED_API_KEY
  LANGFUSE_PUBLIC_KEY_FILE: /run/secrets/LANGFUSE_PUBLIC_KEY
  LANGFUSE_SECRET_KEY_FILE: /run/secrets/LANGFUSE_SECRET_KEY
  S3_ACCESS_KEY_ID_FILE: ${S3_ACCESS_KEY_ID_FILE:-}
  S3_SECRET_ACCESS_KEY_FILE: ${S3_SECRET_ACCESS_KEY_FILE:-}
  TAVILY_API_KEY_FILE: /run/secrets/TAVILY_API_KEY

x-infra-env: &infra-env
  CURRENT_UID: ${CURRENT_UID:-1000}
  CURRENT_GID: ${CURRENT_GID:-1000}
  POSTGRES_USER: ${POSTGRES_USER:-admin}
  POSTGRES_DB: ${POSTGRES_DB:-postgres}
  POSTGRES_SERVER: ${POSTGRES_SERVER:-postgres}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
  LOCAL_STORAGE_ROOT: ${LOCAL_STORAGE_ROOT:-/data/knowledge_files}
  S3_BUCKET: ${S3_BUCKET:-knowledge-files}
  S3_PREFIX: ${S3_PREFIX:-knowledge_files}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}

x-feature-env:
  # ── LLM / Embedding ────────────────────────────────────────
  &feature-env
  LLM_PROVIDER: ${LLM_PROVIDER:-bifrost_pro}
  LLM_MODEL_ROUTE_FAST_PROVIDER: ${LLM_MODEL_ROUTE_FAST_PROVIDER:-bifrost_flash}
  LLM_MODEL_ROUTE_BALANCED_PROVIDER: ${LLM_MODEL_ROUTE_BALANCED_PROVIDER:-bifrost_pro}
  LLM_MODEL_ROUTE_REASONING_PROVIDER: ${LLM_MODEL_ROUTE_REASONING_PROVIDER:-bifrost_reasoner}
  LLM_MODEL_ROUTE_MIN_CONFIDENCE: ${LLM_MODEL_ROUTE_MIN_CONFIDENCE:-0.65}
  RAG_EMBED_PROVIDER: ${RAG_EMBED_PROVIDER:-dashscope}
  RAG_EMBED_BATCH_SIZE: ${RAG_EMBED_BATCH_SIZE:-10}
  # ── RAG Retrieval ──────────────────────────────────────────
  RAG_TOP_K: ${RAG_TOP_K:-4}
  RAG_RERANK_PROVIDER: ${RAG_RERANK_PROVIDER:-bifrost}
  RAG_RERANK_MODEL: ${RAG_RERANK_MODEL:-qwen3-rerank}
  RAG_RERANK_TIMEOUT_SECONDS: ${RAG_RERANK_TIMEOUT_SECONDS:-15}
  RAG_RERANK_CANDIDATE_COUNT: ${RAG_RERANK_CANDIDATE_COUNT:-20}
  RAG_RERANK_TOP_K: ${RAG_RERANK_TOP_K:-4}
  RAG_PLANNER_PROVIDER: ${RAG_PLANNER_PROVIDER:-bifrost_flash}
  RAG_PLANNER_TIMEOUT_SECONDS: ${RAG_PLANNER_TIMEOUT_SECONDS:-8}
  RAG_PLANNER_REFUSAL_CONFIDENCE_THRESHOLD: ${RAG_PLANNER_REFUSAL_CONFIDENCE_THRESHOLD:-0.85}
  RAG_PLANNER_REFUSAL_MESSAGE: ${RAG_PLANNER_REFUSAL_MESSAGE:-当前请求暂时无法可靠回答。}
  RAG_MIN_HIT_COUNT: ${RAG_MIN_HIT_COUNT:-1}
  RAG_MIN_RELEVANCE_SCORE: ${RAG_MIN_RELEVANCE_SCORE:-0.2}
  RAG_MIN_RERANK_SCORE: ${RAG_MIN_RERANK_SCORE:-4.0}
  # ── Knowledge ──────────────────────────────────────────────
  KNOWLEDGE_CHUNK_SIZE: ${KNOWLEDGE_CHUNK_SIZE:-800}
  KNOWLEDGE_CHUNK_OVERLAP: ${KNOWLEDGE_CHUNK_OVERLAP:-120}
  KNOWLEDGE_MAX_UPLOAD_SIZE_MB: ${KNOWLEDGE_MAX_UPLOAD_SIZE_MB:-20}
  # ── Chat / Rate ────────────────────────────────────────────
  CREDIT_DAILY_CHECKIN_AMOUNT: ${CREDIT_DAILY_CHECKIN_AMOUNT:-100}
  AUTH_REGISTER_RATE_LIMIT_TIMES: ${AUTH_REGISTER_RATE_LIMIT_TIMES:-10}
  AUTH_REGISTER_RATE_LIMIT_SECONDS: ${AUTH_REGISTER_RATE_LIMIT_SECONDS:-60}
  AUTH_LOGIN_RATE_LIMIT_TIMES: ${AUTH_LOGIN_RATE_LIMIT_TIMES:-20}
  AUTH_LOGIN_RATE_LIMIT_SECONDS: ${AUTH_LOGIN_RATE_LIMIT_SECONDS:-60}
  BUSINESS_RATE_LIMIT_TIMES: ${BUSINESS_RATE_LIMIT_TIMES:-100}
  BUSINESS_RATE_LIMIT_SECONDS: ${BUSINESS_RATE_LIMIT_SECONDS:-60}
  CHAT_RATE_LIMIT_TIMES: ${CHAT_RATE_LIMIT_TIMES:-10}
  CHAT_RATE_LIMIT_SECONDS: ${CHAT_RATE_LIMIT_SECONDS:-60}
  SMS_MOCK_MODE: ${SMS_MOCK_MODE:-true}
  # ── Observability ─────────────────────────────────────────
  ENABLE_OTEL_METRICS: ${ENABLE_OTEL_METRICS:-false}
  ENABLE_OTEL_TRACES: ${ENABLE_OTEL_TRACES:-false}
  OTEL_TRACES_ENDPOINT: ${OTEL_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}
  PROMETHEUS_OTLP_ENDPOINT: ${PROMETHEUS_OTLP_ENDPOINT:-http://otel-collector:4318/v1/metrics}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
  LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://us.cloud.langfuse.com}

services:
  postgres:
    image: pgvector/pgvector:0.8.1-pg17-bookworm
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_PASSWORD_FILE=/run/secrets/POSTGRES_PASSWORD
    secrets:
      - POSTGRES_PASSWORD
    # 1. 在服务内挂载卷
    volumes:
      - pg_data_v17_test:/var/lib/postgresql/data
      - ./scripts/pg_init:/docker-entrypoint-initdb.d:ro
    #  - ./scripts/pgsql_backup.sh:/usr/local/bin/pg_backup.sh:ro
    logging: *default-logging
    #entrypoint: [ "/bin/sh", "/usr/local/bin/pg_backup.sh" ]
    deploy:
      resources:
        limits:
          memory: 1024M
          #共享缓冲区 工作内存 维护工作内存 有效缓存预测 最大连接数
    command: >
      postgres -c shared_buffers=256MB   -c work_mem=32MB   -c maintenance_work_mem=128MB  -c effective_cache_size=768MB -c max_connections=200 -c logging_collector=on
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7.4-alpine
    secrets:
      - REDIS_PASSWORD
    ports:
      - "${REDIS_PORT:-6379}:6379"
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging
    command: >
      sh -c 'umask 077 && printf "maxmemory 384mb\nmaxmemory-policy allkeys-lru\nrequirepass %s\n" "$$(cat /run/secrets/REDIS_PASSWORD)" > /tmp/redis.conf && exec redis-server /tmp/redis.conf'
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/REDIS_PASSWORD)\" ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    profiles: [ "s3" ]
    logging: *default-logging
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --address ":9000" --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  minio_init:
    image: quay.io/minio/mc:latest
    profiles: [ "s3" ]
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c ' until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
        sleep 2;
      done; mc mb --ignore-existing local/"$${S3_BUCKET}"; mc anonymous set none local/"$${S3_BUCKET}"; '
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-knowledge-files}
    restart: "no"

  db_migrator:
    image: dewflow-backend:2.0.0-web
    user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
    secrets: *app-secrets
    environment:
      <<: [ *infra-env, *feature-env, *secret-file-env ]
    volumes:
      - ./backend:/app/backend
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini:ro
      - ./configs:/app/configs:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  knowledge_storage_init:
    image: alpine:3.20
    logging: *default-logging
    user: "0:0"
    volumes:
      - knowledge_files_volume_test:/data/knowledge_files
    command: >
      sh -c "mkdir -p /data/knowledge_files && chown -R ${CURRENT_UID:-1000}:${CURRENT_GID:-1000} /data/knowledge_files"
    restart: "no"

  bifrost:
    image: maximhq/bifrost:v1.4.11
    profiles: ["bifrost"]
    logging: *default-logging
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      LOG_LEVEL: ${BIFROST_LOG_LEVEL:-info}
      LOG_STYLE: json
    secrets:
      - BIFROST_API_KEY
      - BIFROST_ENCRYPTION_KEY
      - DEEPSEEK_API_KEY
      - DEEPSEEK_API_KEY_2
      - DASHSCOPE_API_KEY
      - DASHSCOPE_API_KEY_2
      - COHERE_API_KEY
      - COHERE_API_KEY_2
    volumes:
      - bifrost_data:/app/data
      - ./configs/bifrost/config.json:/app/data/config.json:ro
    entrypoint:
      - sh
      - -c
      - "export BIFROST_API_KEY=\"$$(cat /run/secrets/BIFROST_API_KEY | tr -d '\\015\\012')\" && export BIFROST_ENCRYPTION_KEY=\"$$(cat /run/secrets/BIFROST_ENCRYPTION_KEY | tr -d '\\015\\012')\" && export DEEPSEEK_API_KEY=\"$$(cat /run/secrets/DEEPSEEK_API_KEY | tr -d '\\015\\012')\" && export DEEPSEEK_API_KEY_2=\"$$(cat /run/secrets/DEEPSEEK_API_KEY_2 | tr -d '\\015\\012')\" && export DASHSCOPE_API_KEY=\"$$(cat /run/secrets/DASHSCOPE_API_KEY | tr -d '\\015\\012')\" && export DASHSCOPE_API_KEY_2=\"$$(cat /run/secrets/DASHSCOPE_API_KEY_2 | tr -d '\\015\\012')\" && export COHERE_API_KEY=\"$$(cat /run/secrets/COHERE_API_KEY | tr -d '\\015\\012')\" && export COHERE_API_KEY_2=\"$$(cat /run/secrets/COHERE_API_KEY_2 | tr -d '\\015\\012')\" && exec /app/main -app-dir /app/data -port \"$${APP_PORT}\" -host \"$${APP_HOST}\" -log-level \"$${LOG_LEVEL}\" -log-style \"$${LOG_STYLE}\""
    ports:
      - "${BIFROST_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header=\"x-bf-vk: $$(cat /run/secrets/BIFROST_API_KEY | tr -d '\\015\\012')\" http://localhost:8080/v1/models >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  api:
    image: dewflow-backend:2.0.0-web
    logging: *default-logging
    user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
    stop_grace_period: 40s
    volumes:
      - ./backend:/app/backend
      - ./configs:/app/configs:ro
      - ./.cache:/app/.cache:ro
      - knowledge_files_volume_test:/data/knowledge_files
    secrets: *app-secrets
    environment:
      <<: [ *infra-env, *feature-env, *secret-file-env ]
      PYTHONMALLOC: default
      WEB_CONCURRENCY: "1"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 800M
        reservations:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db_migrator:
        condition: service_completed_successfully
      knowledge_storage_init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/v1/health_check/live\", timeout=5)' || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --proxy-headers --timeout-graceful-shutdown 30
    ports:
      - "8000:8000"

  task_worker:
    image: dewflow-backend:2.0.0-ai
    user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
    logging: *default-logging
    stop_grace_period: 120s
    volumes:
      - ./backend:/app/backend
      - ./configs:/app/configs:ro
      - ./.cache:/app/.cache:ro
      - knowledge_files_volume_test:/data/knowledge_files
    secrets: *app-secrets
    environment:
      <<: [ *infra-env, *feature-env, *secret-file-env ]
      TASKIQ_HEALTH_MIN_PROCESSES: "2"
    healthcheck:
      test: [ "CMD-SHELL", "python -m backend.worker.tasks.healthcheck || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: taskiq worker backend.infra.task_broker:broker backend.worker.tasks.llm_tasks backend.worker.tasks.knowledge_tasks backend.worker.tasks.repo_analysis_tasks --workers 2 --wait-tasks-timeout 105 --shutdown-timeout 10
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      db_migrator:
        condition: service_completed_successfully
      knowledge_storage_init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 400M
        reservations:
          memory: 128M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    profiles: [ "observability" ]
    logging: *default-logging
    volumes:
      - ./deploy/monitoring/otel-collector-db.yml:/etc/otelcol-contrib/config.yml:ro
    command: [ "--config=/etc/otelcol-contrib/config.yml" ]
    depends_on:
      tempo:
        condition: service_started
    ports:
      - "4317:4317"
      - "4318:4318"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  tempo:
    image: grafana/tempo:2.7.1
    profiles: [ "observability" ]
    logging: *default-logging
    command: [ "-config.file=/etc/tempo.yml" ]
    volumes:
      - ./deploy/monitoring/tempo-db.yml:/etc/tempo.yml:ro
      - tempo_data_db:/tmp/tempo
    ports:
      - "3200:3200"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  prometheus:
    image: prom/prometheus:v3.1.0
    profiles: [ "observability" ]
    logging: *default-logging
    volumes:
      - ./deploy/monitoring/prometheus-db.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data_db:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      otel-collector:
        condition: service_started
      postgres_exporter:
        condition: service_started
      redis_exporter:
        condition: service_started
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  grafana:
    image: grafana/grafana-oss:11.5.8-ubuntu
    profiles: [ "observability" ]
    logging: *default-logging
    environment:
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./deploy/monitoring/grafana_datasources_db.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./deploy/monitoring/grafana_dashboards_provisioning.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./deploy/monitoring/dashboards:/etc/grafana/provisioning/dashboards/dewflow:ro
      - grafana_data_db:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  loki:
    image: grafana/loki:3.4.0
    profiles: [ "observability" ]
    logging: *default-logging
    command: [ "-config.file=/etc/loki/local-config.yaml" ]
    volumes:
      - ./deploy/monitoring/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data_db:/loki
    ports:
      - "3100:3100"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  vector:
    image: timberio/vector:0.50.0-debian
    profiles: [ "observability" ]
    volumes:
      - ./deploy/logging/vector-db.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    profiles: [ "observability" ]
    logging: *default-logging
    secrets:
      - POSTGRES_PASSWORD
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    command: >
      sh -c 'export DATA_SOURCE_NAME="postgresql://$${POSTGRES_USER}:$$(cat /run/secrets/POSTGRES_PASSWORD)@postgres:5432/$${POSTGRES_DB}?sslmode=disable"; exec /bin/postgres_exporter'
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  redis_exporter:
    image: oliver006/redis_exporter:v1.67.0
    profiles: [ "observability" ]
    logging: *default-logging
    secrets:
      - REDIS_PASSWORD
    environment:
      - REDIS_ADDR=redis:6379
    command: >
      sh -c 'export REDIS_PASSWORD="$$(cat /run/secrets/REDIS_PASSWORD)"; exec /redis_exporter'
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    profiles: [ "observability" ]
    logging: *default-logging
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

volumes:
  pg_data_v17_test:
    external: true
    name: prod_db_volume_test
  knowledge_files_volume_test:
    external: true
    name: knowledge_files_volume_test
  tempo_data_db:
    name: tempo_data_db
  prometheus_data_db:
    name: prometheus_data_db
  grafana_data_db:
    name: grafana_data_db
  loki_data_db:
    name: loki_data_db
  minio_data:
    name: minio_data
  bifrost_data:
    name: bifrost_data

secrets:
  SECRET_KEY:
    file: ${SMOKE_SECRET_KEY_FILE:-./secrets/smoke/secret_key.txt}
  POSTGRES_PASSWORD:
    file: ${SMOKE_POSTGRES_PASSWORD_FILE:-./secrets/smoke/postgres_password.txt}
  REDIS_PASSWORD:
    file: ${SMOKE_REDIS_PASSWORD_FILE:-./secrets/smoke/redis_password.txt}
  OPENAI_API_KEY:
    file: ${SMOKE_OPENAI_API_KEY_FILE:-./secrets/smoke/openai_api_key.txt}
